name: Release

on:
  push:
    tags:
      - "v*"
  # Manual fallback — trigger from the GitHub Actions UI if the tag push
  # ever silently skips or a re-run is needed without re-pushing the tag.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.5.0) — must already exist on the repo"
        required: true
        default: ""

permissions:
  contents: write
  packages: write

# Only one release at a time.  Pushing a new tag cancels any in-flight
# release — regardless of which tag started it.
concurrency:
  group: release
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── 0. Validate trigger ──────────────────────────────────────────────────────
  # Resolve the effective tag from either a tag push or a manual dispatch, then
  # validate it matches vX.Y.Z before spending time on any build work.
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install Nushell
        run: cargo install nu --locked

      - name: Resolve and validate tag
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          nu scripts/ci/validate_tag.nu "$TAG" >> "$GITHUB_OUTPUT"

  # ── 1. Quality gate ──────────────────────────────────────────────────────────
  test:
    name: Test & lint
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Install Linux GUI system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libxkbcommon-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libwayland-dev \
            libgl1-mesa-dev \
            libfontconfig1-dev \
            libssl-dev

      - name: Install Rust stable (rustfmt + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Nushell
        run: cargo install nu --locked

      - name: Run quality gate (fmt + clippy + test)
        run: nu scripts/ci/quality_gate.nu

  # ── 2. Binary builds ─────────────────────────────────────────────────────────
  # Build GUI and TUI release binaries for each target platform.
  # The matrix produces one job per (target, runner) combination so builds
  # run in parallel.
  build:
    name: Build — ${{ matrix.target }}
    needs: [validate, test]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86_64 (dynamic — standard distro binary) ─────────────────
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            gui_binary: gitkraft
            tui_binary: gitkraft-tui
            suffix: ""
            install_gui_libs: true

          # ── Windows x86_64 (MSVC) ────────────────────────────────────────────
          - target: x86_64-pc-windows-msvc
            runner: windows-latest
            gui_binary: gitkraft
            tui_binary: gitkraft-tui
            suffix: ".exe"
            install_gui_libs: false

          # ── macOS x86_64 (Intel) ─────────────────────────────────────────────
          # macos-13 is the last Intel-native runner.  macos-latest is now
          # aarch64, which would cross-compile and break openssl-sys
          # (pkg-config refuses cross-compilation without a sysroot).
          - target: x86_64-apple-darwin
            runner: macos-13
            gui_binary: gitkraft
            tui_binary: gitkraft-tui
            suffix: ""
            install_gui_libs: false

          # ── macOS aarch64 (Apple Silicon) ────────────────────────────────────
          - target: aarch64-apple-darwin
            runner: macos-latest
            gui_binary: gitkraft
            tui_binary: gitkraft-tui
            suffix: ""
            install_gui_libs: false

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate.outputs.tag }}

      # ── System libraries (GUI only) ─────────────────────────────────────────
      - name: Install Linux GUI system libraries
        if: matrix.install_gui_libs
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libxkbcommon-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libwayland-dev \
            libgl1-mesa-dev \
            libfontconfig1-dev \
            libssl-dev

      # ── Windows: provide zlib via vcpkg ────────────────────────────────────
      # libz-sys 1.1.26 ships without vendored zlib C sources (src/zlib/ is
      # missing from the published crate).  On Linux/macOS pkg-config finds
      # the system zlib so this is invisible, but on Windows MSVC there is no
      # system zlib and the build falls through to compile missing files
      # (fatal error C1083).
      #
      # The windows-latest runner ships vcpkg at C:\vcpkg but does not
      # export VCPKG_ROOT.  We set it for all subsequent steps via
      # GITHUB_ENV, then install zlib so libz-sys's try_vcpkg() succeeds
      # before it ever reaches build_zlib().
      - name: Install zlib via vcpkg
        if: runner.os == 'Windows'
        run: |
          echo "VCPKG_ROOT=C:\vcpkg" >> $env:GITHUB_ENV
          vcpkg install zlib:x64-windows-static-md

      - name: Install Rust stable + target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # ── Build TUI (all targets) ──────────────────────────────────────────────
      - name: Build TUI release binary
        run: cargo build --release -p gitkraft-tui --target ${{ matrix.target }}

      # ── Build GUI ───────────────────────────────────────────────────────────
      - name: Build GUI release binary
        if: matrix.gui_binary != ''
        run: cargo build --release -p gitkraft --target ${{ matrix.target }}

      # ── Stage artifacts ──────────────────────────────────────────────────────
      - name: Install Nushell
        run: cargo install nu --locked

      # The empty-string matrix values ("") vanish after shell expansion,
      # turning `--suffix  --gui-binary gitkraft` into a mis-parse.
      # Nushell sees --gui-binary as the value of --suffix and "gitkraft"
      # as an extra positional.  Pass the values via env vars so they are
      # never subject to word-splitting or empty-string removal.
      # Force bash on all platforms (Windows defaults to PowerShell).
      - name: Stage release artifacts
        shell: bash
        run: |
          ARGS="$STAGE_TARGET"
          if [ -n "$STAGE_SUFFIX" ]; then
            ARGS="$ARGS --suffix $STAGE_SUFFIX"
          fi
          if [ -n "$STAGE_GUI" ]; then
            ARGS="$ARGS --gui-binary $STAGE_GUI"
          fi
          nu scripts/ci/stage_artifacts.nu $ARGS
        env:
          STAGE_TARGET: ${{ matrix.target }}
          STAGE_SUFFIX: ${{ matrix.suffix }}
          STAGE_GUI: ${{ matrix.gui_binary }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: binaries-${{ matrix.target }}
          path: dist/
          retention-days: 1

  # ── 3. GitHub Release ────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [validate, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate.outputs.tag }}
          fetch-depth: 0

      - name: Install git-cliff
        run: cargo install git-cliff --locked

      - name: Install Nushell
        run: cargo install nu --locked

      - name: Prepare release (RELEASE_NOTES.md + CHANGELOG.md)
        run: nu scripts/release_prepare.nu ${{ needs.validate.outputs.tag }}

      # Download every artifact uploaded by the build matrix
      - name: Download all artifacts
        uses: actions/download-artifact@v8
        with:
          path: artifacts/
          pattern: binaries-*
          merge-multiple: true

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          body_path: RELEASE_NOTES.md
          files: |
            artifacts/*
            LICENSE
            README.md
            CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 4. Publish to crates.io ──────────────────────────────────────────────────
  # Order matters: core must be published first because gui and tui depend on it.
  # gitkraft (crates/gitkraft-gui) is published as `gitkraft` (the GUI binary).
  # gitkraft-tui is published as `gitkraft-tui` (the TUI binary).
  publish:
    name: Publish to crates.io
    needs: [validate, release]
    runs-on: ubuntu-latest
    # `secrets.*` cannot be used in a job-level `if:` on GitHub Actions —
    # the expression is evaluated before secrets are injected and always
    # resolves to the empty string, making the condition unparseable.
    # Instead we expose the secret as an env var and gate every publish
    # step with `if: env.HAS_TOKEN == 'true'`.
    env:
      HAS_TOKEN: ${{ secrets.CRATES_IO_TOKEN != '' }}
    steps:
      - name: Skip notice (no token)
        if: env.HAS_TOKEN != 'true'
        run: echo "⏭️  CRATES_IO_TOKEN is not configured — skipping crates.io publish."

      - uses: actions/checkout@v6
        if: env.HAS_TOKEN == 'true'
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Install Linux GUI system libraries
        if: env.HAS_TOKEN == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libxkbcommon-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libwayland-dev \
            libgl1-mesa-dev \
            libfontconfig1-dev \
            libssl-dev

      - name: Install Rust stable
        if: env.HAS_TOKEN == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        if: env.HAS_TOKEN == 'true'
        uses: Swatinem/rust-cache@v2

      - name: Install Nushell
        if: env.HAS_TOKEN == 'true'
        run: cargo install nu --locked

      - name: Publish gitkraft-core
        if: env.HAS_TOKEN == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: nu scripts/ci/publish_crate.nu gitkraft-core ${{ needs.validate.outputs.version }} --wait 30

      - name: Publish gitkraft (GUI)
        if: env.HAS_TOKEN == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: nu scripts/ci/publish_crate.nu gitkraft ${{ needs.validate.outputs.version }} --readme-dir crates/gitkraft-gui --wait 20

      - name: Publish gitkraft-tui
        if: env.HAS_TOKEN == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: nu scripts/ci/publish_crate.nu gitkraft-tui ${{ needs.validate.outputs.version }} --wait 0
