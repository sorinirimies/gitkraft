name: Release

on:
  push:
    tags:
      - "v*"
  # Manual fallback — trigger from the GitHub Actions UI if the tag push
  # ever silently skips or a re-run is needed without re-pushing the tag.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.5.0) — must already exist on the repo"
        required: true
        default: ""

permissions:
  contents: write
  packages: write

# Only one release at a time.  Pushing a new tag cancels any in-flight
# release — regardless of which tag started it.
concurrency:
  group: release
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── 0. Validate trigger ──────────────────────────────────────────────────────
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve and validate tag
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi

          echo "Resolved tag: ${TAG}"

          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Tag '${TAG}' does not match vX.Y.Z — aborting."
            exit 1
          fi

          VERSION="${TAG#v}"
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "✅ Tag ${TAG} (version ${VERSION}) is valid."

  # ── 1. GitHub Release ────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ needs.validate.outputs.tag }}
          fetch-depth: 0

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Install git-cliff
        run: cargo install git-cliff --locked

      - name: Install Nushell
        run: cargo install nu --locked

      - name: Generate release notes (RELEASE_NOTES.md + CHANGELOG.md)
        run: nu scripts/ci/release_notes.nu ${{ needs.validate.outputs.tag }}

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          body_path: RELEASE_NOTES.md
          files: |
            LICENSE
            README.md
            CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 2. Publish to crates.io ──────────────────────────────────────────────────
  # Order matters: core must be published first because gui and tui depend on it.
  # gitkraft (crates/gitkraft-gui) is published as `gitkraft` (the GUI binary).
  # gitkraft-tui is published as `gitkraft-tui` (the TUI binary).
  publish:
    name: Publish to crates.io
    needs: [validate, release]
    runs-on: ubuntu-latest
    env:
      HAS_TOKEN: ${{ secrets.CRATES_IO_TOKEN != '' }}
    steps:
      - name: Skip notice (no token)
        if: env.HAS_TOKEN != 'true'
        run: echo "⏭️  CRATES_IO_TOKEN is not configured — skipping crates.io publish."

      - uses: actions/checkout@v6
        if: env.HAS_TOKEN == 'true'
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Install Linux GUI system libraries
        if: env.HAS_TOKEN == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libxkbcommon-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libwayland-dev \
            libgl1-mesa-dev \
            libfontconfig1-dev \
            libssl-dev

      - name: Install Rust stable
        if: env.HAS_TOKEN == 'true'
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        if: env.HAS_TOKEN == 'true'
        uses: Swatinem/rust-cache@v2

      - name: Publish gitkraft-core
        if: env.HAS_TOKEN == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          if cargo info gitkraft-core@${VERSION} 2>/dev/null | grep -q "^gitkraft-core"; then
            echo "⏭️  gitkraft-core@${VERSION} already on crates.io — skipping."
          else
            echo "📦 Copying README.md into crates/gitkraft-core…"
            cp README.md crates/gitkraft-core/README.md
            echo "📦 Publishing gitkraft-core…"
            output=$(cargo publish -p gitkraft-core --allow-dirty 2>&1) && echo "$output" || {
              echo "$output"
              echo "$output" | grep -q "already exists" && echo "⏭️  Already published — skipping." || exit 1
            }
            echo "⏳ Waiting 30 s for the index to propagate…"
            sleep 30
          fi

      - name: Publish gitkraft (GUI)
        if: env.HAS_TOKEN == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          if cargo info gitkraft@${VERSION} 2>/dev/null | grep -q "^gitkraft"; then
            echo "⏭️  gitkraft@${VERSION} already on crates.io — skipping."
          else
            echo "📦 Copying README.md into crates/gitkraft-gui…"
            cp README.md crates/gitkraft-gui/README.md
            echo "📦 Publishing gitkraft (GUI)…"
            output=$(cargo publish -p gitkraft --allow-dirty 2>&1) && echo "$output" || {
              echo "$output"
              echo "$output" | grep -q "already exists" && echo "⏭️  Already published — skipping." || exit 1
            }
            echo "⏳ Waiting 20 s for the index to propagate…"
            sleep 20
          fi

      - name: Publish gitkraft-tui
        if: env.HAS_TOKEN == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          if cargo info gitkraft-tui@${VERSION} 2>/dev/null | grep -q "^gitkraft-tui"; then
            echo "⏭️  gitkraft-tui@${VERSION} already on crates.io — skipping."
          else
            echo "📦 Copying README.md into crates/gitkraft-tui…"
            cp README.md crates/gitkraft-tui/README.md
            echo "📦 Publishing gitkraft-tui…"
            output=$(cargo publish -p gitkraft-tui --allow-dirty 2>&1) && echo "$output" || {
              echo "$output"
              echo "$output" | grep -q "already exists" && echo "⏭️  Already published — skipping." || exit 1
            }
          fi
          echo "✅ Publish step complete."
