name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.7.7)"
        required: true
        default: ""

permissions:
  contents: write

concurrency:
  group: release
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── 0. Validate tag ──────────────────────────────────────────────────────────
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve and validate tag
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi
          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Tag '${TAG}' does not match vX.Y.Z — aborting."
            exit 1
          fi
          VERSION="${TAG#v}"
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

  # ── 1. Quality gate (Linux) ───────────────────────────────────────────────────
  test:
    name: Test & lint
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}
      - name: Install Linux GUI libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config libxkbcommon-dev libx11-dev libxrandr-dev \
            libxinerama-dev libxcursor-dev libxi-dev libwayland-dev \
            libgl1-mesa-dev libfontconfig1-dev libssl-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy
      - uses: Swatinem/rust-cache@v2
      - name: Install Nushell
        run: cargo install nu --locked
      - name: Quality gate
        run: nu scripts/ci/quality_gate.nu

  # ── 2. Build matrix ───────────────────────────────────────────────────────────
  # GitHub provides free hosted runners for all three platforms.
  # No self-hosted machines required.
  build:
    name: Build — ${{ matrix.name }}
    needs: [validate, test]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86_64 (GitHub hosted) ─────────────────────────────────────
          - name: Linux x86_64
            runner: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            suffix: ""
            os: linux

          # ── Linux aarch64 (cross-compiled on GitHub hosted ubuntu) ────────────
          - name: Linux aarch64
            runner: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            suffix: ""
            os: linux

          # ── Windows x86_64 (GitHub hosted Windows runner) ─────────────────────
          - name: Windows x86_64
            runner: windows-latest
            target: x86_64-pc-windows-msvc
            suffix: ".exe"
            os: windows

          # ── macOS x86_64 (GitHub hosted macOS runner) ─────────────────────────
          - name: macOS x86_64
            runner: macos-latest
            target: x86_64-apple-darwin
            suffix: ""
            os: macos

          # ── macOS aarch64 / Apple Silicon (GitHub hosted macOS runner) ─────────
          - name: macOS aarch64
            runner: macos-latest
            target: aarch64-apple-darwin
            suffix: ""
            os: macos

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Install Linux GUI libraries + packaging tools
        if: matrix.os == 'linux'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config libxkbcommon-dev libx11-dev libxrandr-dev \
            libxinerama-dev libxcursor-dev libxi-dev libwayland-dev \
            libgl1-mesa-dev libfontconfig1-dev libssl-dev \
            gcc-aarch64-linux-gnu libc6-dev-arm64-cross dpkg-dev rpm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Configure aarch64 cross-linker
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: |
          mkdir -p ~/.cargo
          echo '[target.aarch64-unknown-linux-gnu]' >> ~/.cargo/config.toml
          echo 'linker = "aarch64-linux-gnu-gcc"'   >> ~/.cargo/config.toml

      - name: Build TUI
        run: cargo build --release -p gitkraft-tui --target ${{ matrix.target }}

      - name: Build GUI
        run: cargo build --release -p gitkraft --target ${{ matrix.target }}

      # ── Linux: .deb, .rpm, AppImage ────────────────────────────────────────
      - name: Install Nushell
        if: matrix.os == 'linux'
        run: cargo install nu --locked

      - name: Build .deb and .rpm
        if: matrix.os == 'linux'
        run: nu scripts/ci/package_linux.nu ${{ needs.validate.outputs.version }} ${{ matrix.target }}

      - name: Install appimagetool
        if: matrix.os == 'linux' && matrix.target == 'x86_64-unknown-linux-gnu'
        run: |
          wget -q https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage \
            -O /tmp/appimagetool
          chmod +x /tmp/appimagetool
          sudo cp /tmp/appimagetool /usr/local/bin/appimagetool

      - name: Build AppImage
        if: matrix.os == 'linux' && matrix.target == 'x86_64-unknown-linux-gnu'
        run: bash scripts/ci/package_appimage.sh ${{ needs.validate.outputs.version }} ${{ matrix.target }}

      # ── Windows: NSIS installer ──────────────────────────────────────────────
      - name: Build NSIS installer
        if: matrix.os == 'windows'
        shell: bash
        run: |
          choco install nsis -y --no-progress
          bash scripts/ci/package_windows.sh ${{ needs.validate.outputs.version }}

      # ── Stage raw binaries ───────────────────────────────────────────────────
      - name: Stage binaries
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/gitkraft${{ matrix.suffix }} \
             dist/gitkraft-gui-${{ matrix.target }}${{ matrix.suffix }} || true
          cp target/${{ matrix.target }}/release/gitkraft-tui${{ matrix.suffix }} \
             dist/gitkraft-tui-${{ matrix.target }}${{ matrix.suffix }} || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-${{ matrix.target }}
          path: dist/
          retention-days: 1

  # ── 3. macOS Universal DMG ────────────────────────────────────────────────────
  # Merges the arm64 + x86_64 macOS binaries into a single universal DMG.
  macos-dmg:
    name: macOS Universal DMG
    needs: [validate, build]
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Download arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifacts-aarch64-apple-darwin
          path: artifacts/arm64/

      - name: Download x86_64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: artifacts-x86_64-apple-darwin
          path: artifacts/x86_64/

      - name: Reconstruct target dirs
        run: |
          mkdir -p target/aarch64-apple-darwin/release
          mkdir -p target/x86_64-apple-darwin/release
          cp artifacts/arm64/gitkraft-gui-aarch64-apple-darwin   target/aarch64-apple-darwin/release/gitkraft
          cp artifacts/arm64/gitkraft-tui-aarch64-apple-darwin   target/aarch64-apple-darwin/release/gitkraft-tui
          cp artifacts/x86_64/gitkraft-gui-x86_64-apple-darwin   target/x86_64-apple-darwin/release/gitkraft
          cp artifacts/x86_64/gitkraft-tui-x86_64-apple-darwin   target/x86_64-apple-darwin/release/gitkraft-tui
          chmod +x target/*/release/gitkraft target/*/release/gitkraft-tui

      - name: Create universal binaries
        run: bash scripts/ci/build_universal_macos.sh

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Build DMG
        run: bash packaging/macos/create_dmg.sh ${{ needs.validate.outputs.version }}

      - name: Upload DMG
        uses: actions/upload-artifact@v4
        with:
          name: artifacts-macos-universal
          path: dist/*.dmg
          retention-days: 1

  # ── 4. GitHub Release ─────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: [validate, build, macos-dmg]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
      - name: Install git-cliff
        run: cargo install git-cliff --locked
      - name: Install Nushell
        run: cargo install nu --locked
      - name: Generate release notes
        run: nu scripts/ci/release_notes.nu ${{ needs.validate.outputs.tag }}

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate.outputs.tag }}
          body_path: RELEASE_NOTES.md
          files: |
            artifacts/*
            LICENSE
            README.md
            CHANGELOG.md
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ── 5. Publish to crates.io ───────────────────────────────────────────────────
  publish:
    name: Publish to crates.io
    needs: [validate, release]
    runs-on: ubuntu-latest
    env:
      HAS_TOKEN: ${{ secrets.CRATES_IO_TOKEN != '' }}
    steps:
      - name: Skip (no token)
        if: env.HAS_TOKEN != 'true'
        run: echo "⏭️  CRATES_IO_TOKEN not set — skipping."

      - uses: actions/checkout@v4
        if: env.HAS_TOKEN == 'true'
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Install Linux GUI libraries
        if: env.HAS_TOKEN == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config libxkbcommon-dev libx11-dev libxrandr-dev \
            libxinerama-dev libxcursor-dev libxi-dev libwayland-dev \
            libgl1-mesa-dev libfontconfig1-dev libssl-dev

      - uses: dtolnay/rust-toolchain@stable
        if: env.HAS_TOKEN == 'true'
      - uses: Swatinem/rust-cache@v2
        if: env.HAS_TOKEN == 'true'

      - name: Publish gitkraft-core
        if: env.HAS_TOKEN == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          V="${{ needs.validate.outputs.version }}"
          cargo info gitkraft-core@$V 2>/dev/null | grep -q "^gitkraft-core" \
            && echo "⏭️  Already published." || {
              cp README.md crates/gitkraft-core/README.md
              cargo publish -p gitkraft-core --allow-dirty && sleep 30
            }

      - name: Publish gitkraft (GUI)
        if: env.HAS_TOKEN == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          V="${{ needs.validate.outputs.version }}"
          cargo info gitkraft@$V 2>/dev/null | grep -q "^gitkraft" \
            && echo "⏭️  Already published." || {
              cp README.md crates/gitkraft-gui/README.md
              cargo publish -p gitkraft --allow-dirty && sleep 20
            }

      - name: Publish gitkraft-tui
        if: env.HAS_TOKEN == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          V="${{ needs.validate.outputs.version }}"
          cargo info gitkraft-tui@$V 2>/dev/null | grep -q "^gitkraft-tui" \
            && echo "⏭️  Already published." || {
              cp README.md crates/gitkraft-tui/README.md
              cargo publish -p gitkraft-tui --allow-dirty
            }

  # ── 6. Update AUR ─────────────────────────────────────────────────────────────
  update-aur:
    name: Update AUR
    needs: [validate, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Update PKGBUILD checksums
        run: bash scripts/ci/update_aur.sh ${{ needs.validate.outputs.version }}

      - name: Deploy to AUR
        uses: KSXGitHub/github-actions-deploy-aur@v3
        continue-on-error: true
        with:
          pkgname: gitkraft
          pkgbuild: packaging/aur/gitkraft/PKGBUILD
          commit_username: ${{ secrets.AUR_USERNAME }}
          commit_email: ${{ secrets.AUR_EMAIL }}
          ssh_private_key: ${{ secrets.AUR_SSH_PRIVATE_KEY }}
          commit_message: "Update to v${{ needs.validate.outputs.version }}"
