name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop

env:
  CARGO_TERM_COLOR: always
  # Targets used in the cross-compile check job.
  # cargo check only — no linker or system libraries needed on the runner.
  WINDOWS_TARGET: x86_64-pc-windows-gnu
  MACOS_X86_TARGET: x86_64-apple-darwin
  MACOS_ARM_TARGET: aarch64-apple-darwin

# Cancel in-progress runs on the same branch/PR so we never queue up stale
# jobs after a force-push.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

# ── Shared setup ───────────────────────────────────────────────────────────────
# Most jobs need the native GUI libraries that Iced links against on Linux.
# We install them once here and reference the step from each job.
# TUI jobs (ratatui/crossterm) are pure-Rust and need no extra system deps.

jobs:
  # ── 1. Formatting ────────────────────────────────────────────────────────────
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting (workspace)
        run: cargo fmt --all -- --check

  # ── 2. Clippy ────────────────────────────────────────────────────────────────
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux GUI system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libxkbcommon-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libwayland-dev \
            libgl1-mesa-dev \
            libfontconfig1-dev \
            libssl-dev

      - name: Install Rust stable + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run clippy (workspace)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings -A deprecated

  # ── 3. Tests ─────────────────────────────────────────────────────────────────
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux GUI system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libxkbcommon-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libwayland-dev \
            libgl1-mesa-dev \
            libfontconfig1-dev \
            libssl-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Generate lockfile (if absent)
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile

      # Run the full test suite.  GUI rendering tests are compile-only on a
      # headless runner (they never open a window), so they pass fine.
      - name: cargo test --workspace
        run: cargo test --workspace --all-features --all-targets

  # ── 4. Build (dev) ───────────────────────────────────────────────────────────
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux GUI system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libxkbcommon-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libwayland-dev \
            libgl1-mesa-dev \
            libfontconfig1-dev \
            libssl-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build core (dev)
        run: cargo build -p gitkraft-core

      - name: Build GUI (dev)
        run: cargo build -p gitkraft

      - name: Build TUI (dev)
        run: cargo build -p gitkraft-tui

  # ── 5. Docs ──────────────────────────────────────────────────────────────────
  doc:
    name: doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux GUI system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libxkbcommon-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libwayland-dev \
            libgl1-mesa-dev \
            libfontconfig1-dev \
            libssl-dev

      # Use nightly for doc(cfg) and intra-doc link checking.
      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      # Build docs for the two published crates (core is an internal dep).
      - name: cargo doc (gitkraft)
        run: cargo doc --no-deps -p gitkraft --all-features
        env:
          RUSTDOCFLAGS: --cfg docsrs -D warnings

      - name: cargo doc (gitkraft-tui)
        run: cargo doc --no-deps -p gitkraft-tui --all-features
        env:
          RUSTDOCFLAGS: --cfg docsrs -D warnings

  # ── 6. Cross-compile check (Windows + macOS from Linux runner) ───────────────
  #
  # Runs `cargo check` against three foreign targets entirely on the Linux
  # runner — no Windows or macOS runner needed.
  #
  # What this catches:
  #   • Wrong import paths or feature gates in platform-specific code
  #   • #[cfg] branches that only compile on Windows or macOS
  #   • Type mismatches in platform-specific blocks
  #   • Missing feature flags in Cargo.toml
  #
  # What it does NOT do:
  #   • Run Windows/macOS tests (no OS APIs available on the Linux runner)
  #   • Produce runnable binaries (cargo check stops before codegen)
  #
  # Only gitkraft-core is checked because it contains all platform-specific
  # Git operations code.  The GUI and TUI crates depend on Iced/Ratatui which
  # require native system libraries that cannot be cross-checked without a
  # matching sysroot.
  cross-check:
    name: cross-check (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - x86_64-pc-windows-gnu # Windows x86_64
          - x86_64-apple-darwin # macOS Intel
          - aarch64-apple-darwin # macOS Apple Silicon
    steps:
      - uses: actions/checkout@v4

      # mingw-w64 provides the Windows import libraries that the GNU linker
      # stubs need even during cargo check (extern "system" symbols are
      # resolved by the linker driver even without full codegen).
      - name: Install mingw-w64 (Windows target only)
        if: matrix.target == 'x86_64-pc-windows-gnu'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends mingw-w64

      - name: Install Rust stable + cross-check target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: cross-${{ matrix.target }}

      # cargo check runs the full type-checker and borrow-checker but skips
      # LLVM codegen and linking — fast and sufficient to catch API mismatches.
      - name: cargo check gitkraft-core (${{ matrix.target }})
        run: cargo check -p gitkraft-core --target ${{ matrix.target }}

  # ── 7. Nu script tests ───────────────────────────────────────────────────────
  test-nu:
    name: test-nu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Generate lockfile (if absent)
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile

      - name: Install Nushell
        run: cargo install nu --locked

      - name: Run Nu script tests
        run: nu scripts/tests/run_all.nu
