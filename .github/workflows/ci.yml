name: CI

on:
  pull_request:
  push:
    branches:
      - main
      - master
      - develop

env:
  CARGO_TERM_COLOR: always

# Cancel in-progress runs on the same branch/PR so we never queue up stale
# jobs after a force-push.
concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

# ── Shared setup ───────────────────────────────────────────────────────────────
# Most jobs need the native GUI libraries that Iced links against on Linux.
# We install them once here and reference the step from each job.
# TUI jobs (ratatui/crossterm) are pure-Rust and need no extra system deps.

jobs:
  # ── 1. Formatting ────────────────────────────────────────────────────────────
  fmt:
    name: fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + rustfmt
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Check formatting (workspace)
        run: cargo fmt --all -- --check

  # ── 2. Clippy ────────────────────────────────────────────────────────────────
  clippy:
    name: clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux GUI system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libxkbcommon-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libwayland-dev \
            libgl1-mesa-dev \
            libfontconfig1-dev \
            libssl-dev

      - name: Install Rust stable + clippy
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Run clippy (workspace)
        run: cargo clippy --workspace --all-targets --all-features -- -D warnings -A deprecated

  # ── 3. Tests ─────────────────────────────────────────────────────────────────
  test:
    name: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux GUI system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libxkbcommon-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libwayland-dev \
            libgl1-mesa-dev \
            libfontconfig1-dev \
            libssl-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Generate lockfile (if absent)
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile

      # Run the full test suite.  GUI rendering tests are compile-only on a
      # headless runner (they never open a window), so they pass fine.
      - name: cargo test --workspace
        run: cargo test --workspace --all-features --all-targets

  # ── 4. Build (dev) ───────────────────────────────────────────────────────────
  build:
    name: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux GUI system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libxkbcommon-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libwayland-dev \
            libgl1-mesa-dev \
            libfontconfig1-dev \
            libssl-dev

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Build core (dev)
        run: cargo build -p gitkraft-core

      - name: Build GUI (dev)
        run: cargo build -p gitkraft

      - name: Build TUI (dev)
        run: cargo build -p gitkraft-tui

  # ── 4b. Windows cross-check (TUI only) ──────────────────────────────────────
  # Verify the TUI crate cross-compiles for Windows from Linux via cargo-xwin.
  # This catches Windows-specific compilation issues without needing a Windows runner.
  cross-check-windows:
    name: cross-check (windows)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable + Windows target
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install cargo-xwin and dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends lld llvm clang
          cargo install cargo-xwin --locked

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: cross-windows

      - name: Cross-check TUI for Windows
        run: cargo xwin check -p gitkraft-tui --target x86_64-pc-windows-msvc

      - name: Cross-check core for Windows
        run: cargo xwin check -p gitkraft-core --target x86_64-pc-windows-msvc

  # ── 5. Docs ──────────────────────────────────────────────────────────────────
  doc:
    name: doc
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux GUI system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libxkbcommon-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libwayland-dev \
            libgl1-mesa-dev \
            libfontconfig1-dev \
            libssl-dev

      # Use nightly for doc(cfg) and intra-doc link checking.
      - name: Install Rust nightly
        uses: dtolnay/rust-toolchain@nightly

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      # Build docs for the two published crates (core is an internal dep).
      - name: cargo doc (gitkraft)
        run: cargo doc --no-deps -p gitkraft --all-features
        env:
          RUSTDOCFLAGS: --cfg docsrs -D warnings

      - name: cargo doc (gitkraft-tui)
        run: cargo doc --no-deps -p gitkraft-tui --all-features
        env:
          RUSTDOCFLAGS: --cfg docsrs -D warnings

  # ── 6. Nu script tests ───────────────────────────────────────────────────────
  test-nu:
    name: test-nu
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Generate lockfile (if absent)
        if: hashFiles('Cargo.lock') == ''
        run: cargo generate-lockfile

      - name: Install Nushell
        run: cargo install nu --locked

      - name: Run Nu script tests
        run: nu scripts/tests/run_all.nu
