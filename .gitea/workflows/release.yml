name: Release

on:
  push:
    tags:
      - "v*"
  # Manual fallback — trigger from the Gitea Actions UI if the tag push
  # ever silently skips or a re-run is needed without re-pushing the tag.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to release (e.g. v0.5.0) — must already exist on the repo"
        required: true
        default: ""

permissions:
  contents: write
  packages: write

# Only one release at a time.  Pushing a new tag cancels any in-flight
# release — regardless of which tag started it.
concurrency:
  group: release
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── 0. Validate tag ──────────────────────────────────────────────────────────
  # Resolve the effective tag from either a tag push or a manual dispatch, then
  # validate it matches vX.Y.Z before spending time on any build work.
  validate:
    name: Validate tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.resolve.outputs.tag }}
      version: ${{ steps.resolve.outputs.version }}
    steps:
      - name: Resolve and validate tag
        id: resolve
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${{ github.ref_name }}"
          fi

          echo "Resolved tag: ${TAG}"

          if [[ ! "${TAG}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "❌ Tag '${TAG}' does not match vX.Y.Z — aborting."
            exit 1
          fi

          VERSION="${TAG#v}"
          echo "tag=${TAG}"         >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "✅ Tag ${TAG} (version ${VERSION}) is valid."

  # ── 1. Quality gate ──────────────────────────────────────────────────────────
  test:
    name: Test & lint
    needs: validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Install Linux GUI system libraries
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libxkbcommon-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libwayland-dev \
            libgl1-mesa-dev \
            libfontconfig1-dev \
            libssl-dev

      - name: Install Rust stable (rustfmt + clippy)
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          . "$HOME/.cargo/env"
          rustup component add rustfmt
          rustup component add clippy

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2

      - name: Install Nushell
        run: cargo install nu --locked

      - name: Run quality gate (fmt + clippy + test)
        run: nu scripts/ci/quality_gate.nu

  # ── 2. Binary builds ─────────────────────────────────────────────────────────
  build:
    name: Build — ${{ matrix.target }}
    needs: [validate, test]
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Linux x86_64 (dynamic) ───────────────────────────────────────────
          - target: x86_64-unknown-linux-gnu
            runner: ubuntu-latest
            gui_binary: gitkraft
            tui_binary: gitkraft-tui
            suffix: ""
            install_gui_libs: true

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Install Linux GUI system libraries
        if: matrix.install_gui_libs
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libxkbcommon-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libwayland-dev \
            libgl1-mesa-dev \
            libfontconfig1-dev \
            libssl-dev

      - name: Install Rust stable + target
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH
          . "$HOME/.cargo/env"
          rustup target add ${{ matrix.target }}

      - name: Cache Cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Build TUI release binary
        run: cargo build --release -p gitkraft-tui --target ${{ matrix.target }}

      - name: Build GUI release binary
        if: matrix.gui_binary != ''
        run: cargo build --release -p gitkraft --target ${{ matrix.target }}

      - name: Install Nushell
        run: cargo install nu --locked

      # The empty-string matrix values ("") vanish after shell expansion,
      # turning `--suffix  --gui-binary gitkraft` into a mis-parse.
      # Nushell sees --gui-binary as the value of --suffix and "gitkraft"
      # as an extra positional.  Pass the values via env vars so they are
      # never subject to word-splitting or empty-string removal.
      - name: Stage release artifacts
        run: |
          ARGS="$STAGE_TARGET"
          if [ -n "$STAGE_SUFFIX" ]; then
            ARGS="$ARGS --suffix $STAGE_SUFFIX"
          fi
          if [ -n "$STAGE_GUI" ]; then
            ARGS="$ARGS --gui-binary $STAGE_GUI"
          fi
          nu scripts/ci/stage_artifacts.nu $ARGS
        env:
          STAGE_TARGET: ${{ matrix.target }}
          STAGE_SUFFIX: ${{ matrix.suffix }}
          STAGE_GUI: ${{ matrix.gui_binary }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v3
        with:
          name: binaries-${{ matrix.target }}
          path: dist/
          retention-days: 1

  # ── 3. Release ───────────────────────────────────────────────────────────────
  release:
    name: Create Release
    needs: [validate, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.validate.outputs.tag }}
          fetch-depth: 0

      - name: Install Rust stable
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Install git-cliff
        run: cargo install git-cliff --locked

      - name: Install Nushell
        run: cargo install nu --locked

      - name: Generate release notes (RELEASE_NOTES.md + CHANGELOG.md)
        run: nu scripts/ci/release_notes.nu ${{ needs.validate.outputs.tag }}

      - name: Download all artifacts
        uses: actions/download-artifact@v3
        with:
          path: artifacts/

      - name: Flatten artifact directories
        run: |
          cd artifacts
          for dir in */; do
            cp -r "$dir"* . 2>/dev/null || true
            rm -rf "$dir"
          done

      - name: List artifacts
        run: ls -lh artifacts/

      - name: Create Release
        run: |
          TAG="${{ needs.validate.outputs.tag }}"
          GITEA_URL="${{ github.server_url }}"
          REPO="${{ github.repository }}"
          TOKEN="${{ secrets.GITHUB_TOKEN }}"

          echo "🎉 Creating new Gitea release for tag ${TAG}..."

          # Create the release via Gitea API
          RELEASE_BODY=$(cat RELEASE_NOTES.md | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))')
          RESPONSE=$(curl -s -X POST \
            "${GITEA_URL}/api/v1/repos/${REPO}/releases" \
            -H "Authorization: token ${TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{
              \"tag_name\": \"${TAG}\",
              \"name\": \"${TAG}\",
              \"body\": ${RELEASE_BODY},
              \"draft\": false,
              \"prerelease\": false
            }")

          RELEASE_ID=$(echo "$RESPONSE" | python3 -c 'import sys,json; print(json.load(sys.stdin)["id"])' 2>/dev/null)
          if [ -z "$RELEASE_ID" ] || [ "$RELEASE_ID" = "None" ]; then
            echo "❌ Failed to create release:"
            echo "$RESPONSE"
            exit 1
          fi
          echo "✅ Release created (id: ${RELEASE_ID})"

          # Upload assets
          for file in artifacts/* LICENSE README.md CHANGELOG.md; do
            [ -f "$file" ] || continue
            FILENAME=$(basename "$file")
            echo "📦 Uploading ${FILENAME}..."
            curl -s -X POST \
              "${GITEA_URL}/api/v1/repos/${REPO}/releases/${RELEASE_ID}/assets?name=${FILENAME}" \
              -H "Authorization: token ${TOKEN}" \
              -H "Content-Type: application/octet-stream" \
              --data-binary "@${file}" > /dev/null
            echo "✅ Uploaded ${FILENAME}"
          done

          echo "🎉 Release ${TAG} published at ${GITEA_URL}/${REPO}/releases/tag/${TAG}"

  # ── 4. Publish to crates.io ──────────────────────────────────────────────────
  # Order matters: core must be published first because gui and tui depend on it.
  # gitkraft (crates/gitkraft-gui) is published as `gitkraft` (the GUI binary).
  # gitkraft-tui is published as `gitkraft-tui` (the TUI binary).
  publish:
    name: Publish to crates.io
    needs: [validate, release]
    runs-on: ubuntu-latest
    # `secrets.*` cannot be used in a job-level `if:` on Gitea Actions —
    # the expression is evaluated before secrets are injected and always
    # resolves to the empty string, making the condition unparseable.
    # Instead we expose the secret as an env var and gate every publish
    # step with `if: env.HAS_TOKEN == 'true'`.
    env:
      HAS_TOKEN: ${{ secrets.CRATES_IO_TOKEN != '' }}
    steps:
      - name: Skip notice (no token)
        if: env.HAS_TOKEN != 'true'
        run: echo "⏭️  CRATES_IO_TOKEN is not configured — skipping crates.io publish."

      - uses: actions/checkout@v4
        if: env.HAS_TOKEN == 'true'
        with:
          ref: ${{ needs.validate.outputs.tag }}

      - name: Install Linux GUI system libraries
        if: env.HAS_TOKEN == 'true'
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config \
            libxkbcommon-dev \
            libx11-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libwayland-dev \
            libgl1-mesa-dev \
            libfontconfig1-dev \
            libssl-dev

      - name: Install Rust stable
        if: env.HAS_TOKEN == 'true'
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --default-toolchain stable
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache Cargo dependencies
        if: env.HAS_TOKEN == 'true'
        uses: Swatinem/rust-cache@v2

      - name: Publish gitkraft-core
        if: env.HAS_TOKEN == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          if cargo info gitkraft-core@${VERSION} 2>/dev/null | grep -q "^gitkraft-core"; then
            echo "⏭️  gitkraft-core@${VERSION} already on crates.io — skipping."
          else
            echo "📦 Copying README.md into crates/gitkraft-core…"
            cp README.md crates/gitkraft-core/README.md
            echo "📦 Publishing gitkraft-core…"
            output=$(cargo publish -p gitkraft-core --allow-dirty 2>&1) && echo "$output" || {
              echo "$output"
              echo "$output" | grep -q "already exists" && echo "⏭️  Already published — skipping." || exit 1
            }
            echo "⏳ Waiting 30 s for the index to propagate…"
            sleep 30
          fi

      - name: Publish gitkraft (GUI)
        if: env.HAS_TOKEN == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          if cargo info gitkraft@${VERSION} 2>/dev/null | grep -q "^gitkraft"; then
            echo "⏭️  gitkraft@${VERSION} already on crates.io — skipping."
          else
            echo "📦 Copying README.md into crates/gitkraft-gui…"
            cp README.md crates/gitkraft-gui/README.md
            echo "📦 Publishing gitkraft (GUI)…"
            output=$(cargo publish -p gitkraft --allow-dirty 2>&1) && echo "$output" || {
              echo "$output"
              echo "$output" | grep -q "already exists" && echo "⏭️  Already published — skipping." || exit 1
            }
            echo "⏳ Waiting 20 s for the index to propagate…"
            sleep 20
          fi

      - name: Publish gitkraft-tui
        if: env.HAS_TOKEN == 'true'
        env:
          CARGO_REGISTRY_TOKEN: ${{ secrets.CRATES_IO_TOKEN }}
        run: |
          VERSION="${{ needs.validate.outputs.version }}"
          if cargo info gitkraft-tui@${VERSION} 2>/dev/null | grep -q "^gitkraft-tui"; then
            echo "⏭️  gitkraft-tui@${VERSION} already on crates.io — skipping."
          else
            echo "📦 Copying README.md into crates/gitkraft-tui…"
            cp README.md crates/gitkraft-tui/README.md
            echo "📦 Publishing gitkraft-tui…"
            output=$(cargo publish -p gitkraft-tui --allow-dirty 2>&1) && echo "$output" || {
              echo "$output"
              echo "$output" | grep -q "already exists" && echo "⏭️  Already published — skipping." || exit 1
            }
          fi
          echo "✅ Publish step complete."
